name: Build macOS app

on:
  workflow_dispatch:

env:
  FLUTTER_VERSION: "3.38.10"

jobs:
  build_macos:
    name: Build macOS arm64 app
    runs-on: macos-14

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Flutter
        uses: flutter-actions/setup-flutter@v4
        with:
          version: ${{ env.FLUTTER_VERSION }}
          channel: stable

      - name: Fetch dependencies
        working-directory: app
        run: flutter pub get

      - name: Build macOS app
        working-directory: app
        env:
          CODE_SIGNING_ALLOWED: "NO"
          CODE_SIGNING_REQUIRED: "NO"
        run: flutter build macos --release

      - name: Package app bundle
        working-directory: app/build/macos/Build/Products/Release
        run: ditto -c -k --keepParent localsend_app.app LocalSend-macos-arm64.zip

      - name: Upload macOS app
        uses: actions/upload-artifact@v6
        with:
          name: localsend-macos-arm64
          path: app/build/macos/Build/Products/Release/LocalSend-macos-arm64.zip
          if-no-files-found: error
